name: Copier update

# Tier-1 of the MCP fleet-maintenance pipeline (ORG-PLAN-086). Runs
# `copier update` against the template HEAD on a schedule, opens a PR with the
# chrome-only diff, and NEVER auto-merges — a human reviews + merges. On a merge
# conflict (`.rej` files present) it files/updates a single tracking issue
# instead of a broken PR. This workflow itself is CHROME, so it flows down to
# every satellite via the very updates it opens.

on:
  schedule:
    # Weekly, Tuesday 05:30 UTC (staggered from the org routine fleet).
    - cron: "30 5 * * 2"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: copier-update
  cancel-in-progress: false

jobs:
  copier-update:
    runs-on: ubuntu-latest
    # `secrets` is NOT a valid context in a step-level `if:` — surface CI_APP_ID
    # through a job-level env so the App-token step can gate on its presence
    # (`env` IS valid in `if:`). Without this the workflow fails to compile.
    env:
      CI_APP_ID: ${{ secrets.CI_APP_ID }}
    steps:
      # The org stromy-ci App token: clones the (possibly private) template and
      # authors the PR/issue. No-op-safe if the App secrets are absent — the
      # step falls back to GITHUB_TOKEN (which can still open a same-repo PR).
      - name: Generate stromy-ci App token
        id: app-token
        if: ${{ env.CI_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: stromy-org

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run copier update
        id: update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          set -euo pipefail
          git config user.name "stromy-ci[bot]"
          git config user.email "stromy-ci[bot]@users.noreply.github.com"
          # --skip-answered keeps the recorded answers; --trust runs template _tasks.
          uvx copier update --trust --skip-answered --defaults || true
          # Detect merge rejects (copier writes *.rej on conflict) and changes.
          if find . -name '*.rej' -not -path './.git/*' | grep -q .; then
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          else
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          # Flag whether the diff touches auto-redeploy paths (merge == redeploy).
          if git status --porcelain | grep -qE '(pyproject\.toml|uv\.lock|Dockerfile|src/|skills/)'; then
            echo "redeploys=true" >> "$GITHUB_OUTPUT"
          else
            echo "redeploys=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open update PR (never auto-merge)
        if: steps.update.outputs.changed == 'true' && steps.update.outputs.conflict == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          branch: chore/copier-update
          delete-branch: true
          commit-message: "chore: ⬆️ Adopt fastmcp-template updates (copier update)"
          title: "chore: ⬆️ Adopt fastmcp-template updates"
          labels: scheduled-routine
          body: |
            Automated `copier update` from the `fastmcp-template` HEAD (Tier-1,
            ORG-PLAN-086). Reviews the **chrome-only** diff and merge — this PR is
            **never** auto-merged.

            **Deploy on merge:** ${{ steps.update.outputs.redeploys == 'true' && 'YES — the diff touches an auto-redeploy path (pyproject.toml / uv.lock / Dockerfile / src/ / skills/); merging will trigger deploy-aca.' || 'no — workflow/scripts/docs-only chrome; no redeploy.' }}

            If your domain code, deps, or version changed here, STOP — the
            three-zone model means updates must only touch chrome. Report it.

      - name: File conflict tracking issue
        if: steps.update.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          set -euo pipefail
          TITLE="copier update: merge conflicts need manual reconciliation"
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          BODY="\`copier update\` produced \`.rej\` merge rejects that need a human. Run \`uvx copier update --trust\` locally, resolve the \`.rej\` files (chrome wins; keep your individuality files), and open the PR by hand. Tier-2 \`copier recopy\` re-baseline may be warranted if this repo is far behind (see infra-docs/ai/mcp-fleet-maintenance.md)."
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Re-detected on $(date -u +%Y-%m-%d). $BODY"
          else
            gh issue create --title "$TITLE" --label scheduled-routine --body "$BODY"
          fi
