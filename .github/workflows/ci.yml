name: CI

# This repository is public while stromy-org is private. GitHub does not allow
# a public caller to load a reusable workflow from a private repository, so the
# small Python gate is intentionally self-contained here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv python install 3.13
      - run: uv sync
      - name: Lint
        run: uv run ruff check
      - name: Type check
        run: uv run pyright src/stromy_workflows_mcp

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv python install 3.13
      - run: uv sync
      - name: Tests
        run: uv run pytest
