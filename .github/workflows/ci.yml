name: CI
# CI runs ruff (E,F,I,UP,ASYNC,B,PERF,S) + pyright + pytest via the org reusable workflow.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-ci:
    uses: stromy-org/stromy-org/.github/workflows/ci-python.yml@main
    with:
      source_package: "src/stromy_workflows_mcp"
    # Forward the org stromy-ci App secrets (CI_APP_ID / CI_APP_PRIVATE_KEY)
    # so the reusable workflow can clone private deps. No-op if absent.
    secrets: inherit
